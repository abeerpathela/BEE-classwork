<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="mainHeading">Retail Billing System </h1>
    <div class="container" >
        <div class="card">
            <h2>Add To Cart</h2>
            <div class="productGroup">
                <div>
                    <label for="product-filter">Product Information:</label>
                    <input type="text" id="product-filter" name="product-filter" placeholder="Enter product information" required>
                    </div>
                    <div>
                    <label for="product-price">Product Price:</label>
                    <input type="number" id="product-price" name="product-price" placeholder="Enter product price" required>
                    </div>
                    <div>
                        <label for="product-qty">Product Quantity:</label>
                    <input type="number" id="product-qty" name="product-qty" placeholder="Enter product quantity" required>
                    </div>
                <div><button type="submit" id="addtocart">Add to Cart</button></div>
            </div>
            
        </div>
        <h2>Cart Items</h2>
        <div class="cart-items">
            <table border="1">
                <thead>
                    <tr>
                        <th>Product Information</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody">
                </tbody>
            </table>

        </div>

        <div class="card">
            <h2>Bill Summary</h2>
            <div class="bill-summary">
                <div class="total-items">Total Items: <span id="totalItems">0</span></div>
                <div class="sub-total">Total: <span id="subTotal">0.00</span></div>
                <div class="GST">GST : <span id="gstAmount">0.00</span></div>
                <div class="grand-total">Grand Total: <span id="grandTotal">0.00</span></div>
            </div>
        </div>


    </div>
    <script src="index.js"></script>
</body>
</html>
